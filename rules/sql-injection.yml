rules:
  - id: sql-injection-string-concat
    patterns:
      - pattern: $CURSOR.execute("..." + ...)
      - pattern-not: $CURSOR.execute("...", (...))
    message: |
      SQL Injection 風險：cursor.execute() 使用字串拼接。
      攻擊者可透過 username 參數注入惡意 SQL（例如 ' OR '1'='1）。
      修正方式：使用參數化查詢 cursor.execute("... WHERE x = ?", (value,))
    languages: [python]
    severity: ERROR
    metadata:
      category: security
      cwe: CWE-89
      owasp: A03:2021 - Injection

  - id: hardcoded-aws-key
    pattern: |
      $VAR = "AKIA..."
    message: |
      Hardcoded AWS Access Key ID 偵測到。
      將金鑰寫進程式碼會導致版控洩漏，應改用環境變數或 AWS Secrets Manager。
    languages: [python]
    severity: ERROR
    metadata:
      category: security
      cwe: CWE-798
      owasp: A02:2021 - Cryptographic Failures

  - id: debug-mode-enabled
    pattern: |
      DEBUG = True
    message: |
      DEBUG = True 不應出現在 production 程式碼。
      Debug 模式會暴露 stack trace 和內部資訊給攻擊者。
    languages: [python]
    severity: WARNING
    metadata:
      category: security
      cwe: CWE-489
